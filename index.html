<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Futuristic Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
            overflow: hidden;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .digital-time {
            font-size: 48px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .date-display {
            font-size: 18px;
            color: #fff;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .timezone-selector {
            margin-top: 15px;
        }

        .timezone-selector select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .timezone-selector select option {
            background: #1a0a2e;
            color: #fff;
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 300px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-label {
            opacity: 0.7;
        }

        .info-value {
            font-weight: bold;
            color: #00ffff;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .alarm-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .alarm-input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin: 5px 0;
            outline: none;
        }

        .alarm-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .stopwatch {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .stopwatch-time {
            font-size: 36px;
            font-family: 'Courier New', monospace;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            margin-bottom: 15px;
        }

        .stopwatch-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .stopwatch-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .hud, .info-panel, .controls, .stopwatch {
                position: relative;
                margin: 10px auto;
                max-width: 90%;
            }

            #canvas-container {
                height: 50vh;
            }

            .digital-time {
                font-size: 32px;
            }
        }

        .glow {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
            50% { text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 40px rgba(0, 255, 255, 0.8); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <script>
  atOptions = {
    'key' : 'e961bb343cf76978250f0c2ed462d1d2',
    'format' : 'iframe',

<script src="https://www.highperformanceformat.com/e961bb343cf76978250f0c2ed462d1d2/invoke.js"></script>


    <div class="hud">
        <div class="digital-time glow" id="digital-time">00:00:00</div>
        <div class="date-display" id="date-display"></div>
        <div class="timezone-selector">
            <select id="timezone-select">
                <option value="0">UTC</option>
                <option value="-5">EST (UTC-5)</option>
                <option value="-6">CST (UTC-6)</option>
                <option value="-7">MST (UTC-7)</option>
                <option value="-8">PST (UTC-8)</option>
                <option value="1">CET (UTC+1)</option>
                <option value="5.5">IST (UTC+5:30)</option>
                <option value="8">CST China (UTC+8)</option>
                <option value="9">JST (UTC+9)</option>
            </select>
        </div>
    </div>

    <div class="controls">
        <div>
            <button class="control-btn" id="toggle-rotation">Pause Rotation</button>
            <button class="control-btn" id="toggle-glow">Toggle Glow</button>
            <button class="control-btn" id="change-color">Change Color</button>
        </div>
        <div class="alarm-section">
            <h4 style="margin-bottom: 10px;">Set Alarm</h4>
            <input type="time" class="alarm-input" id="alarm-time">
            <button class="control-btn" style="width: 100%; margin-top: 10px;" id="set-alarm">Set Alarm</button>
        </div>
    </div>

    <div class="info-panel">
        <h4 style="margin-bottom: 15px; color: #00ffff;">Clock Information</h4>
        <div class="info-item">
            <span class="info-label">Day of Week:</span>
            <span class="info-value" id="day-of-week"></span>
        </div>
        <div class="info-item">
            <span class="info-label">Week of Year:</span>
            <span class="info-value" id="week-of-year"></span>
        </div>
        <div class="info-item">
            <span class="info-label">Day of Year:</span>
            <span class="info-value" id="day-of-year"></span>
        </div>
        <div class="info-item">
            <span class="info-label">Unix Timestamp:</span>
            <span class="info-value" id="unix-time"></span>
        </div>
    </div>

    <div class="stopwatch">
        <h4 style="margin-bottom: 10px;">Stopwatch</h4>
        <div class="stopwatch-time" id="stopwatch-display">00:00:00.000</div>
        <button class="stopwatch-btn" id="start-stop">Start</button>
        <button class="stopwatch-btn" id="reset">Reset</button>
        <button class="stopwatch-btn" id="lap">Lap</button>
        <div id="laps" style="margin-top: 10px; font-size: 12px;"></div>
    </div>

    <script>
        // Three.js Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Orbit Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x00ffff, 1, 100);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff00ff, 1, 100);
        pointLight2.position.set(-10, -10, 10);
        scene.add(pointLight2);

        // Create Clock Base
        const clockGroup = new THREE.Group();
        
        // Outer Ring
        const ringGeometry = new THREE.TorusGeometry(5, 0.3, 16, 100);
        const ringMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff,
            emissiveIntensity: 0.5,
            shininess: 100
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        clockGroup.add(ring);

        // Clock Face
        const faceGeometry = new THREE.CircleGeometry(4.5, 64);
        const faceMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x111133,
            transparent: true,
            opacity: 0.8,
            side: THREE.DoubleSide
        });
        const face = new THREE.Mesh(faceGeometry, faceMaterial);
        face.position.z = -0.1;
        clockGroup.add(face);

        // Hour Markers
        for (let i = 0; i < 12; i++) {
            const angle = (i * 30) * Math.PI / 180;
            const markerGeometry = new THREE.BoxGeometry(0.15, 0.5, 0.1);
            const markerMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xffffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.3
            });
            const marker = new THREE.Mesh(markerGeometry, markerMaterial);
            marker.position.x = Math.sin(angle) * 4;
            marker.position.y = Math.cos(angle) * 4;
            marker.rotation.z = -angle;
            clockGroup.add(marker);
        }

        // Center Sphere
        const centerGeometry = new THREE.SphereGeometry(0.3, 32, 32);
        const centerMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xffffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5
        });
        const center = new THREE.Mesh(centerGeometry, centerMaterial);
        center.position.z = 0.2;
        clockGroup.add(center);

        // Hour Hand
        const hourHandGeometry = new THREE.BoxGeometry(0.15, 2.5, 0.1);
        const hourHandMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xff0000,
            emissive: 0xff0000,
            emissiveIntensity: 0.5
        });
        const hourHand = new THREE.Mesh(hourHandGeometry, hourHandMaterial);
        hourHand.position.y = 1.25;
        const hourHandPivot = new THREE.Group();
        hourHandPivot.add(hourHand);
        hourHandPivot.position.z = 0.3;
        clockGroup.add(hourHandPivot);

        // Minute Hand
        const minuteHandGeometry = new THREE.BoxGeometry(0.12, 3.5, 0.1);
        const minuteHandMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x00ff00,
            emissive: 0x00ff00,
            emissiveIntensity: 0.5
        });
        const minuteHand = new THREE.Mesh(minuteHandGeometry, minuteHandMaterial);
        minuteHand.position.y = 1.75;
        const minuteHandPivot = new THREE.Group();
        minuteHandPivot.add(minuteHand);
        minuteHandPivot.position.z = 0.4;
        clockGroup.add(minuteHandPivot);

        // Second Hand
        const secondHandGeometry = new THREE.BoxGeometry(0.08, 4, 0.1);
        const secondHandMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xffff00,
            emissive: 0xffff00,
            emissiveIntensity: 0.5
        });
        const secondHand = new THREE.Mesh(secondHandGeometry, secondHandMaterial);
        secondHand.position.y = 2;
        const secondHandPivot = new THREE.Group();
        secondHandPivot.add(secondHand);
        secondHandPivot.position.z = 0.5;
        clockGroup.add(secondHandPivot);

        scene.add(clockGroup);
        camera.position.z = 15;

        // Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 50;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xffffff,
            transparent: true,
            opacity: 0.6
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Time Variables
        let timezoneOffset = 0;
        let alarmTime = null;
        let alarmSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZSA8PVqzn77BdGAg+ltryxnMpBSh+zPLaizsIGGS57OihUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8rJiGgY8mN3ywnQrBSl/zPLajDoIGWS56+mjUhELTKXh8bllHAU2jdXzzn0vBSKAy/HZljYIG2u98+mjUBANU6rk8g==');

        // Stopwatch Variables
        let stopwatchRunning = false;
        let stopwatchStart = 0;
        let stopwatchElapsed = 0;
        let lapCounter = 1;

        // Update Clock
        function updateClock() {
            const now = new Date();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const adjustedTime = new Date(utcTime + (3600000 * timezoneOffset));

            const hours = adjustedTime.getHours();
            const minutes = adjustedTime.getMinutes();
            const seconds = adjustedTime.getSeconds();

            // Update 3D Clock Hands
            const secondAngle = (seconds / 60) * Math.PI * 2;
            const minuteAngle = ((minutes + seconds / 60) / 60) * Math.PI * 2;
            const hourAngle = ((hours % 12 + minutes / 60) / 12) * Math.PI * 2;

            secondHandPivot.rotation.z = -secondAngle;
            minuteHandPivot.rotation.z = -minuteAngle;
            hourHandPivot.rotation.z = -hourAngle;

            // Update Digital Display
            document.getElementById('digital-time').textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            // Update Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-display').textContent = adjustedTime.toLocaleDateString('en-US', options);

            // Update Info Panel
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            document.getElementById('day-of-week').textContent = days[adjustedTime.getDay()];
            
            const startOfYear = new Date(adjustedTime.getFullYear(), 0, 0);
            const diff = adjustedTime - startOfYear;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);
            document.getElementById('day-of-year').textContent = dayOfYear;

            const weekOfYear = Math.ceil(dayOfYear / 7);
            document.getElementById('week-of-year').textContent = weekOfYear;
            
            document.getElementById('unix-time').textContent = Math.floor(adjustedTime.getTime() / 1000);

            // Check Alarm
            if (alarmTime) {
                const alarmHours = parseInt(alarmTime.split(':')[0]);
                const alarmMinutes = parseInt(alarmTime.split(':')[1]);
                if (hours === alarmHours && minutes === alarmMinutes && seconds === 0) {
                    alert('⏰ ALARM! Time: ' + alarmTime);
                    try { alarmSound.play(); } catch(e) {}
                }
            }
        }

        // Update Stopwatch
        function updateStopwatch() {
            if (stopwatchRunning) {
                const currentTime = Date.now();
                const elapsed = stopwatchElapsed + (currentTime - stopwatchStart);
                
                const milliseconds = elapsed % 1000;
                const seconds = Math.floor(elapsed / 1000) % 60;
                const minutes = Math.floor(elapsed / 60000) % 60;
                const hours = Math.floor(elapsed / 3600000);

                document.getElementById('stopwatch-display').textContent = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(3, '0')}`;
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            updateClock();
            updateStopwatch();
            
            controls.update();
            
            particlesMesh.rotation.y += 0.0005;
            
            pointLight1.position.x = Math.sin(Date.now() * 0.001) * 10;
            pointLight1.position.y = Math.cos(Date.now() * 0.001) * 10;
            
            renderer.render(scene, camera);
        }

        animate();

        // Event Listeners
        document.getElementById('timezone-select').addEventListener('change', (e) => {
            timezoneOffset = parseFloat(e.target.value);
        });

        document.getElementById('toggle-rotation').addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            document.getElementById('toggle-rotation').textContent = 
                controls.autoRotate ? 'Pause Rotation' : 'Resume Rotation';
        });

        let glowEnabled = true;
        document.getElementById('toggle-glow').addEventListener('click', () => {
            glowEnabled = !glowEnabled;
            const glowElements = document.querySelectorAll('.glow');
            glowElements.forEach(el => {
                if (glowEnabled) {
                    el.classList.add('glow');
                } else {
                    el.classList.remove('glow');
                }
            });
        });

        const colors = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff00, 0xff0000];
        let colorIndex = 0;
        document.getElementById('change-color').addEventListener('click', () => {
            colorIndex = (colorIndex + 1) % colors.length;
            ringMaterial.color.setHex(colors[colorIndex]);
            ringMaterial.emissive.setHex(colors[colorIndex]);
        });

        document.getElementById('set-alarm').addEventListener('click', () => {
            alarmTime = document.getElementById('alarm-time').value;
            if (alarmTime) {
                alert('Alarm set for ' + alarmTime);
            }
        });

        document.getElementById('start-stop').addEventListener('click', () => {
            if (!stopwatchRunning) {
                stopwatchStart = Date.now();
                stopwatchRunning = true;
                document.getElementById('start-stop').textContent = 'Stop';
            } else {
                stopwatchElapsed += Date.now() - stopwatchStart;
                stopwatchRunning = false;
                document.getElementById('start-stop').textContent = 'Start';
            }
        });

        document.getElementById('reset').addEventListener('click', () => {
            stopwatchRunning = false;
            stopwatchElapsed = 0;
            stopwatchStart = 0;
            lapCounter = 1;
            document.getElementById('stopwatch-display').textContent = '00:00:00.000';
            document.getElementById('start-stop').textContent = 'Start';
            document.getElementById('laps').innerHTML = '';
        });

        document.getElementById('lap').addEventListener('click', () => {
            if (stopwatchRunning) {
                const lapTime = document.getElementById('stopwatch-display').textContent;
                const lapDiv = document.createElement('div');
                lapDiv.textContent = `Lap ${lapCounter++}: ${lapTime}`;
                lapDiv.style.padding = '5px';
                lapDiv.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
                document.getElementById('laps').insertBefore(lapDiv, document.getElementById('laps').firstChild);
            }
        });

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
